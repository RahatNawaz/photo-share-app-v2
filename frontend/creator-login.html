<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Creator Login</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">
        <span class="back-arrow">&#8592;</span>
        Back
    </a>
    <h1>Creator Login</h1>

    <form id="creatorLoginForm">
        <input type="email" id="creatorEmail" placeholder="Creator Email" required>
        <input type="password" id="creatorPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p id="loginMessage"></p>

    <p>New creator?</p>
    <a href="creator-register.html" class="btn secondary">Register Creator</a>

    <p>Already registered but not verified?</p>
    <a href="verify-creator.html" class="btn secondary">Verify Creator Email</a>
</div>

<script src="script.js?v=5"></script>
</body>
</html>
