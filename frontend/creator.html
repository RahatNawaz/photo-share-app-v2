<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Creator Upload</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <a href="index.html" class="back-link">
            <span class="back-arrow">&#8592;</span>
            Back
        </a>
    </div>

    <div class="top-right">
        <a href="creator-dashboard.html" class="btn secondary">
            View My Uploads
        </a>

        <button class="logout-btn" onclick="logoutCreator()">
            Logout
        </button>
    </div>
</div>

<div class="container page-content">
    <h1>Creator Upload</h1>

    <form id="uploadForm">
        <input type="text" id="title" placeholder="Title" required>
        <textarea id="caption" placeholder="Caption" required></textarea>
        <input type="text" id="location" placeholder="Location">
        <input type="text" id="people" placeholder="People present">
        <input type="file" id="image" accept="image/*" required>

        <button type="submit">Upload Image</button>
    </form>

    <p id="uploadMessage"></p>
</div>

<script>
if (localStorage.getItem("role") !== "creator") {
    window.location.href = "creator-login.html";
}
</script>

<script>
function logoutCreator() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
}
</script>

<script src="script.js?v=5"></script>
</body>
</html>
