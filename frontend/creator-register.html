<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Creator Register</title>
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">
        <span class="back-arrow">&#8592;</span>
        Back
    </a>
    <h1>Creator Register</h1>

    <form id="creatorRegisterForm">
        <input type="text" id="creatorRegisterName" placeholder="Full Name" required>
        <input type="email" id="creatorRegisterEmail" placeholder="Email" required>
        <input type="password" id="creatorRegisterPassword" placeholder="Password" required>
        <button type="submit">Register Creator</button>
    </form>

    <p id="creatorRegisterMessage"></p>

    <p>Already registered?</p>
    <a href="creator-login.html" class="btn secondary">Creator Login</a>
</div>

<script src="script.js?v=1"></script>
</body>
</html>
