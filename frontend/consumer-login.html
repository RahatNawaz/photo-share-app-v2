<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Consumer Login</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">
        <span class="back-arrow">&#8592;</span>
        Back
    </a>
    <h1>Consumer Login</h1>

    <form id="consumerLoginForm">
        <input type="email" id="consumerEmail" placeholder="Email" required>
        <input type="password" id="consumerPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p id="consumerLoginMessage"></p>

    <p>New consumer?</p>
    <a href="consumer-register.html" class="btn secondary">Register</a>

    <p>Already registered but not verified?</p>
    <a href="verify-consumer.html" class="btn secondary">Verify Email</a>
</div>

<script src="script.js?v=3"></script>
</body>
</html>
