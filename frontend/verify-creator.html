<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Creator Email</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<div class="container">
    <a href="creator-login.html" class="back-link">
        <span class="back-arrow">&#8592;</span>
        Back to Login
    </a>
    <h1>Verify Creator Email</h1>

    <form id="verifyCreatorForm">
        <input type="email" id="verifyCreatorEmail" placeholder="Email" required>
        <input type="text" id="verifyCreatorCode" placeholder="Verification Code" required>
        <button type="submit">Verify</button>
    </form>

    <p id="verifyCreatorMessage"></p>
</div>

<script src="script.js?v=5"></script>
</body>
</html>
