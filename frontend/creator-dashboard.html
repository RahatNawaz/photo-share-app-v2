<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Creator Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <a href="creator.html" class="back-link">
            <span class="back-arrow">&#8592;</span>
            Upload New Image
        </a>
    </div>

    <div class="top-right">
        <button class="logout-btn" onclick="logoutCreator()">
            Logout
        </button>
    </div>
</div>

<div class="container page-content">
    <h1>Creator Dashboard</h1>
    <p>View uploaded media content and metadata.</p>

    <div id="creatorGallery" class="gallery"></div>
</div>

<script>
if (localStorage.getItem("role") !== "creator") {
    window.location.href = "creator-login.html";
}

function logoutCreator() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
}
</script>

<script src="script.js"></script>
<script>
    loadCreatorImages();
</script>

</body>
</html>
