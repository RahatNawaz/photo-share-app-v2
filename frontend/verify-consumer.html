<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Consumer Email</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <a href="consumer-login.html" class="back-link">
        <span class="back-arrow">&#8592;</span>
        Back to Login
    </a>
    <h1>Verify Email</h1>

    <p>Enter the verification code sent to your email.</p>

    <form id="verifyConsumerForm">
        <input type="email" id="verifyEmail" placeholder="Email" required>
        <input type="text" id="verifyCode" placeholder="Verification Code" required>
        <button type="submit">Verify</button>
    </form>

    <p id="verifyMessage"></p>
</div>

<script src="script.js"></script>
</body>
</html>
