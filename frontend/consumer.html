<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Feed</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <a href="index.html" class="back-link">
            <span class="back-arrow">&#8592;</span>
            Back
        </a>
    </div>

    <div class="top-right">
        <span id="loggedInUser" class="user-name"></span>

        <button class="logout-btn" onclick="logoutConsumer()">
            Logout
        </button>
    </div>
</div>

<div class="container page-content">
    <h1>Feed</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by title, caption, location or tags">
        <button onclick="searchImages()">Search</button>
        <button onclick="loadImages()">Show All</button>
    </div>

    <div id="gallery" class="gallery"></div>
</div>

<script>
if (localStorage.getItem("role") !== "consumer") {
    window.location.href = "consumer-login.html";
}
</script>

<script src="script.js?v=10"></script>
<script>
    showLoggedInUser();
    loadImages();
</script>

</body>
</html>
